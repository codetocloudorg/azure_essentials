# ============================================================================
# Kubernetes Deployment for Hello Container
# ============================================================================
# Code to Cloud | www.codetocloud.io
#
# This manifest deploys the hello-container app to AKS with:
#   - 2 replicas for high availability
#   - LoadBalancer service for external access
#   - Resource limits for cost control
#
# USAGE:
#   # Replace ACR_NAME with your registry
#   kubectl apply -f k8s-deployment.yaml
#
#   # Check deployment status
#   kubectl get pods
#   kubectl get svc hello-container
#
#   # Get external IP
#   kubectl get svc hello-container -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-container
  labels:
    app: hello-container
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-container
  template:
    metadata:
      labels:
        app: hello-container
    spec:
      containers:
      - name: hello-container
        # Image will be replaced by deployment script with actual ACR name
        image: ${ACR_LOGIN_SERVER}/hello-container:v1
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: hello-container
  labels:
    app: hello-container
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: hello-container
